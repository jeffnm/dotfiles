# A TOML linter such as https://github.com/tombi-toml/tombi can use this schema to validate your config. 
# If you encounter any problems, please make an issue at https://github.com/yazi-rs/schemas. 

#:schema https://yazi-rs.github.io/schemas/keymap.json 

# See yazi-default.toml for defaults. This config only includes my overrides.

[opener]
windsurf = [
  { run = 'windsurf "$@"', orphan = true, for = "unix" },
]
sublimemerge = [
  { run = 'smerge "$@"', orphan = true, for = "unix" },
]

[open]
prepend_rules = [
	# Folder
	{ url = "*/", use = [ "edit", "windsurf", "sublimemerge", "open", "reveal" ] },
  { mime = "text/*", use = [ "edit", "windsurf", "open", "reveal"]}
]
